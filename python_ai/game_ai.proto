syntax = "proto3";

package vision;// 约等于命名空间

// ---------------------------------------------------------
// 1. 核心数据结构 (Messages)
// ---------------------------------------------------------

//定义边界框
message BBox {
    float x = 1;           // 中心点 X
    float y = 2;           // 中心点 Y
    float width = 3;       // 宽
    float height = 4;      // 高
    string class_name = 5; // 类别名称 (如 "player", "projectile")
    float confidence = 6;  // 置信度
}

// 玩家在某一帧的基础物理与 UI 状态
// message PlayerState {
//   // 目标检测框 (用于判断双方的空间距离)
//   float x = 1;
//   float y = 2;
//   float width = 3;
//   float height = 4;

//   // 静态 UI 识别结果
//   int32 hp_percent = 5; // 血量百分比 (0-100)
//   int32 drive_gauge = 6; // 核心资源槽数量
// }

// ---------------------------------------------------------
// 2. 请求与响应契约 (Request & Response)
// ---------------------------------------------------------
// C++ 发送给 Python 的请求
message FrameRequest {
  uint64 frame_id = 1; // 异步回调对齐的唯一标识

  bytes image_data = 2;// 游戏画面流
  
  uint64 timestamp_ms = 3; // 时间戳
}

// Python 返回给 C++ 的结果
message FrameResponse {
  uint64 frame_id = 1; // 回传帧序号
  
  repeated BBox boxes = 2;// 识别到的目标框
  
  int32 inference_latency_ms = 3; // Python 端的纯推理耗时监控
}

// ---------------------------------------------------------
// 3. 微服务接口定义 (Service)
// ---------------------------------------------------------
service VisionAI {// rpc 函数名(请求体/message1) returns(回复体/message)
  rpc AnalyzeFrame(FrameRequest) returns (FrameResponse){}
}